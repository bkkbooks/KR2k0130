body:
  text: 龍沙紀略地理類八雜記之屬提要臣等謹案龍沙紀略一卷國朝方式濟撰式濟字屋源號訞園康熙己丑進士官中書舍人是編乃式濟之父登嶧謫居黑龍江時式濟往省因據所見聞考核古蹟勒為九門一曰方隅二曰山川三曰經制四曰時令五曰風俗六曰飲食七曰貢賦八曰物産九曰屋宇總名曰龍沙紀略考後漢書班超傳贊曰坦步葱雪咫尺龍沙章懷太子注曰謂葱嶺雪山龍堆沙漠也漢書胸奴傳曰康居烏孫豈能踰白龍堆而冦西邊孟康注曰龍堆形如土龍髙大者二三丈卑者丈餘在西域中又酈道元水經注曰鄯善國東垂當白龍堆則龍堆在西不在東又漢書武帝本紀曰衛青復將六軍絶幕顔師古注曰沙上曰幕直度曰絶後漢書西域傳曰孝武深維久長之計命選虎臣浮河絶幕又竇憲燕然山銘稱絶大漠李陵别歌稱經萬里分渡沙溪則沙漠迤繞西北亦不在東自劉孝標有賦得龍沙宵月明詩李白有將軍分虎竹戰士卧龍沙之句始誤以龍沙為一地而詩家遂沿為塞外之通稱式濟記東北之事而以龍沙為書名蓋沿用舊文之故不知自唐以來渤海大氏奄有諸土己久為城都宫室之國豈可以龍沙為目哉然白山黑水之間古來輿記大抵得諸傳聞即近時修志乘者秉筆之人亦未必親至其地式濟久住于斯又閒居多暇得以逰覽詢訪究其詳悉如辨混同江源出長白山土人呼為松阿里江松阿里江北與諾尼江合流東北受黑龍江又南受烏蘇里江滙注于海因其納三江之大故名混同蓋松阿里自南而北黑龍江自北而南厯二千五百里之遙兩江不得混稱其上遊未㑹時仍當稱松阿里江云云此足證金史混同江一名黑龍江之誤又辨金志宋瓦之訛松花又搜討黑龍江源與塞外入江諸小水及精竒尼江諾尼江諸派亦多向時志乘所未載固志輿圖者所必考舊附述本堂諸詩集後今以所載悉屬地理故析而録諸史部焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書龍沙紀略中書舍人方式濟撰方隅邊荒沿革傳聞異辭黑龍江尢為絶域古史書而不詳盛朝大一統之化方隅日廣余備極搜討得梗槩焉蓋自奉天過開原出威逺堡關而郡縣盡外有七鎮曰吉林烏喇曰寧古塔曰新城曰伊蘭哈喇屬寧古塔將軍轄由新城之伯都納渡諾尼江而北曰卜魁曰默爾根曰艾渾屬黑龍江將軍轄皆在奉天府東北廣輿記載沿諾尼江上自海西下至黑龍江按後魏有黑水部唐有黑水府府治在今開原縣而今之吉林寧古塔新城𨽻焉以黑水名者因黑龍江尾也黑水部四至無考今諾尼江在䝉古境內卜魁站名土人謂驛為站在新城之北八百里距七站或曰大力人為布庫曾有布庫居此故名今曰卜魁誤也或曰有達呼哩人名卜魁耕於此或曰元置軍民萬户府五一曰布固江今卜魁枕腦溫江而布固江未知所在舊站去城十五里地名齊齊哈爾立城後移站於城城因站名官文書皆稱之默爾根河名鎮城依河西在卜魁東北四百二十里距六站相傳康熙初年掘井得石有莫來耕三大字繫唐年號余按唐疆宇不及此且非誥誡勒石語也艾渾在默爾根東三百四十里距五站一名艾滸言可畏也鎮城在黑龍江西岸江之東有舊艾渾城相傳元黑龍衛城也自鎮城西北千一百里為雅克薩城舊址過此而西又千餘里今邊界立有界碑按輿表黑龍江將軍境東至海五千里西至喀爾喀界一千八百里南至松花江八百里北至俄羅斯界三千里據卜魁言也其言松花江指白都納之左與諾尼交㑹處俄羅斯自西北袤延至正北為地甚廣今界碑在西北昻班格里必齊河之東而北有山為限考四境元時盡𨽻版圖明代皆䝉古錫伯達呼哩紅呼哩索倫散處國朝之初悉歸附焉後俄羅斯侵入境內築城曰雅克薩又順黑龍江而南據呼麻拉康熙二十三年上命寧古塔副都統薩布素率舟師由松花江溯黑龍江上流伐之彼自呼麻拉退保雅克薩城大兵於艾渾立城與之相距康熙二十八年圍雅克薩城攻之急彼遣使間道詣闕籲請命解圍聽其去而雅克薩城廢西距千餘里立界石艾渾遂永為重鎮以薩布素為黑龍江將軍從征軍士自寧古塔遷婦子家焉復於默爾根設參領卜魁設副都統分兵為協鎮康熙三十二年薩帥以默爾根居兩鎮間首尾易制奏請移節而艾渾改駐副都統康熙三十八年復以默爾根地瘠不可容衆奏移卜魁而默爾根增置副都統今將軍仍稱黑龍江者沿艾渾立官之始也俄羅斯古大食國厯今一千七百一十餘年元太祖與其弟分收地其弟滅俄羅斯即以封之曰察罕汗白為察罕汗即可汗之稱國仍舊名元入中土沿諾尼江黑龍江置驛嵗與察罕汗通問慰江岸殘址猶有存者其王都曰脫博斯寄城近邊曰尼布楚城色楞額城尼爾古斯城尼爾古斯有總管駐守入通市者皆尼布楚人别其種曰羅剎誤老鎗又誤老羌卜魁城之南諾尼江以東通鏗河以西䝉古杜爾伯特地輿表云杜爾伯特東至黑龍江將軍界一百四十里西至札賴特界三十里南至郭爾羅斯鎮國公界一百四十里北至索倫界一百里杜爾伯特以南至松阿里江北岸䝉古郭爾羅斯地按輿表郭爾羅斯東至杜爾伯特界八十里西至本部輔國公界一百四十里南至烏喇將軍界一百四十里北至杜爾伯特界一百二十里蓋杜爾伯特地象曲尺與郭爾羅斯錯故東北皆倚也卜魁城西渡諾尼江䝉古札賴特地輿表云札賴特東至杜爾伯特界三十五里西至郭爾羅斯鎮國公界二十五里南至郭爾羅斯輔國公界一百五十里北至色衣鏗山無交界余按西至當是科爾沁鎮國公界郭爾羅斯似誤輿表載科爾沁鎮國公地東至札賴特界可證黑龍江以南圗沁河以北諾尼江以東鄂爾固納河以東八圍人索倫地黑龍江以北精竒尼江源以南虞人鄂倫春地其衆夾精奇尼江以居鄂爾固納河以西庫倫海以北鄂羅斯虞人地庫倫海以南喀爾喀河以西巴爾虎地山川卜魁以南至新城數百里皆平漠其三面之二百里內亦無山過此則巖巒環叠多從興安嶺發脉而溪澗陂湖之水瀠洄於境內者以數百計皆䝉古名莫曉其義最大者三江黑龍精奇尼諾尼也寧古塔屬之松阿里烏蘇里二江與諾尼黑龍㑹為混同而受境內諸支流故並紀之江曰烏喇河曰必拉湖曰諾爾海曰鄂模黑龍江源明一統志云出北山盛京通志亦祇云出西北塞外今按江源出俄羅斯境其上游為鄂諾河鄂諾源出自安巴興安諸山之南東流六百里與科勒蘇河合又東北八百里受衆流為黑龍江北㑹尼布楚河經尼布楚城東又三百餘里北流至昻班格里必齊河界碑入我境東抵察哈鹽峰凡一千五百餘里復東南流六百里經多斯峰呼瑪拉故墟之間至額蘇里與精奇尼江合其合處猶未至艾渾數十里也過新艾渾城東門稍東南流經托里爾峰博果里山西北至蘇爾喜峰之北又折而東經茂峰􅬃木之間至葉爾博和河與松阿里江合西北視艾渾城已千里矣江在俄羅斯境內河之自西而東入江者九曰巴爾吉曰阿哈楚曰塔爾巴哈泰曰圖魯泰曰他拉巴爾集曰特楞曰額克碩曰額倫曰昻依德河之自南而北入江者三曰布拉克窩集曰圖里格曰溫多其自界碑橫而東也河之由西北而南入江者九曰阿集格格里必齊曰卓爾克奇曰昻班格里必齊曰俄羅曰鄂爾多昆曰烏里蘇曰博倫穆達曰額爾格曰必勒覃也自南而北入江者四曰鄂爾固納河曰穆河曰額牧勒河曰旁庫河鄂爾固納為俄羅斯界河故其名獨著小河滙此而入江者十有一曰依密曰牛耳曰默里兒肯曰特爾布爾曰根曰開拉里曰伊密曰特納克曰魁曰默爾根曰札敦而伊密特納克魁默爾根札敦五河又滙於開拉里以入鄂爾固納達於江庫倫海周匝千里在黑龍江之南開拉里河之左其南有烏里順河烏闌泉及俄羅斯之克魯倫河皆北來滙於此由鄂爾固納達江克魯倫河發源之山與黑龍江源之安巴興安南北相望亦大川也庫倫海東南八百里內又有噶爾必海烏闌海市育里海以受南北山之水其支河有七曰安巴哈爾渾曰伊闌色模曰喀爾札布魯克圖曰赫爾赫齊曰西巴拉泰曰呼魯思泰曰喀爾喀各以距三海近者入之而仍由烏里順河北注以庫倫為歸宿江自察哈鹽峰而南也至呼瑪拉城始有支河曰呼瑪拉河由西北入也其滙入呼瑪拉之小河四曰塔哈曰呼集里曰窩勒科曰呼蘭其發源多斯峰下者有河曰模林發源阿拉爾山下者有河曰默勒爾由東北入也斜與默勒爾相對由西北入者曰庫鼎河又新艾渾城之前曰昆河博果里山麓曰遜河入遜河滙流者曰占河皆由西北入又珠德赫山發源者曰默里爾克河圖勒爾山發源者曰博屯河皆由東北入與遜河相射江自蘇爾喜峰復折而東也峰之左曰尼滿河峰之右曰哈拉河又茂峰之左曰吉林河茂峰之右曰庫穆納河又有珠春河庫裕魯河蘇魯河必占河由東北而入江者八也又卧龍旗河烏爾噶爾河錫里穆第爾河西雅滿河滙尼滿以達於江者也與尼滿斜對曰科爾芬河過此又有五音河嘉里河富河宰河葉爾博和河由西南而入江者六也盛京通志云黑龍江即薩哈連江薩哈連者黑也金史云混同江一名黑龍江水微黑考混同源出長白山舊名粟末江遼改為混同江土人呼松阿里江金志誤宋瓦又傳誤松花其流自南而北黑龍江自北而南其與黑龍㑹厯二千五百里之遙則兩江不得混稱明矣松阿里江北與諾尼江合流折而東北受黑龍江又南受烏蘇里江滙注於海因其納三江之大故名混同則其上游未㑹於諾尼仍當稱松阿里江也金祖伐遼將攻黃龍次混同江無舟楫乘赭白馬竟涉世宗大定二十五年封混同江神立廟致祭蓋坤靈所種由來舊矣精奇尼江盛京通志不載精奇尼形容之詞如云誠哉是也江源出境內極北之山在察哈鹽峰之北將及千里江形如弓東南流八百餘里合錫里穆第河復折而西三百餘里至額蘇里與黑龍江合河之自西北而東南入於精奇尼江者二納爾赫蘇希河托喀河也自東北而西南以入者十有七最大者曰阿爾集曰寧尼曰錫里穆第也其小河由阿爾集以達者額爾格也烏能也烏拉喀也由寧尼以達者勤都也特尼也由錫里穆第以達者隂鏗也畢沙也陽奇爾也納喇也鄂爾模爾科也穆敏也翁額也外此曰烏爾格曰託瑪曰貝敦烏爾格與江發源一山雙汊並下不百里而合託瑪貝敦發源於都立奇山後迤邐以入而江將盡矣諾尼江即腦溫江盛京通志作諾尼䝉古謂腦溫為碧諾尼意同今呼嫩江明一統志云源出西北邊外不可考蓋江之在明為甌脫而一統志載之者第指其與松阿里合流處故不知其源今按江源出宜呼爾山山在黑龍江之南興安嶺下江流自北而南經察克達奇山之東額勒克爾山之西循默爾根城北門復稍轉西下抵卜魁城西門凡一千四百餘里與松阿里江合河之自西北而東注諾尼者十有八曰東郭羅曰喀諾曰孤壘鏗曰訥都爾曰多布科爾曰謳鏗曰甘河曰雞窩兒曰諾敏曰必臘曰格尼曰阿倫木曰庫爾竒魯曰丫兒曰機勤曰哈岱坎曰圖沁也東郭羅發源于興安嶺與江源斜並遙望水光夾瀉近接宜呼爾山故誤謂諾尼兩源並出也至諸河互有支幹雞窩兒由甘河達江必臘格尼由諾敏機勤由庫爾奇魯河哈岱坎由雅爾河圗沁由綽爾河河之自東而西入諾尼者十有二曰納玉兒曰喀魯爾曰鄂多曰密奇爾曰默陸爾曰木訥爾曰赫魯爾曰默爾根曰羅拉喀曰訥木爾曰塔噶爾也密奇爾由默勒爾達江木訥爾由赫魯爾達江羅拉喀由訥木爾達江又納玉爾喀魯爾之間有湖曰依克車勒克奇湖不通江境之南界松阿里江發源長白山北流四百餘里經吉林鎮城之東又西北流二百里出法塔哈邊折而西繞白都納城南西北三面凡三百餘里與諾尼江合其上游之支河不具載自合諾尼東北流一千六百里北㑹黑龍江又四百里南㑹烏蘇里江是名混同江江之南屬寧古塔其北為境內地河之自南而北入江者六曰拉林曰阿爾楚庫曰費克圖曰奇普拉曰馬淹曰呼爾哈西北入江而流長者曰伊克河其小河由伊克以達者曰希費勒曰博和里曰法爾圗琿又有鄂罕河音達穆河及安巴河皆西北流以入焉河之自北而南入江者曰呼倫河其小河之由呼倫以達者曰通鏗曰納敏曰額琿曰額集密曰呼拉庫其呼倫以東河之南滙於江者曰碩羅曰富特庫曰穆琳曰阿濟格富勒琿曰昻班富勒琿曰西林曰昻班烏納琿曰錫伯曰昻班呼特亨曰巴蘭江之北三百餘里有團海發源汪濊出坎滙小河十有三東達於江曰烏穆魯曰哈木奇曰依春曰徹里曰必罕曰窩集曰活曰屯曰洪果曰穆遜曰圖曰哈羅曰阿西克灘烏蘇里江發源西噶塔山之北在寧古塔之東千餘里厯千二百里北與混同江合將入之數十里東西岐而為二自是東北流合黑龍精奇尼諾尼松阿里烏蘇里五江之水厯千餘里入海此千餘里內河之自北而南滙入者二曰奇穆尼曰庫魯河之自西而東滙入者十有九曰諾雷布拉克曰克赤曰富達爾塔拉哈曰默爾奇塔拉哈曰格林曰格根曰科爾古曰卓羅曰多林曰赤克圖哈曰必占曰犀陳曰梅庫曰亨滚曰齊林依曰喀圖密曰約密曰里赤曰法特海其由格林河以達者為多斯密河由亨滚河以達者為哈達烏爾河額密勒河河之自東而西滙入者二十有三曰敦敦曰巴拉爾曰必勒古曰由特曰哈爾集曰希拉河曰尼達哈曰哈里曰達斡曰希爾巴希曰納木登特曰敖梯曰約民曰奎瑪曰夏里曰瑪噶爾齊曰赫勒里曰發停曰器寧曰阿科起曰巴喀曰敖達里曰科齊按黑龍江發源俄羅斯境自西至東凡七千餘里精奇尼江源以南松阿里江源以北南北凡三千餘里百谷萬派莫不循度朝宗重潤之慶車軌斯同誠哉王㑹之大觀也興安嶺一曰新安嶺或曰蔥嶺之支絡也盤旋境內數千里襟帶三江之左右為衆流發源由卜魁至默爾根艾渾置驛嶺上巡邊者渡諾尼西北數百里則陟降取道松柞數十圍髙窮目力穿林而行午不見日石色斑駁若趙千里畫幅間物有石洞洞中几榻天然如琢行者闢草得之藉少憩焉察哈鹽峰在黑龍江東北隅山形如剖璧面西南背東北峭削千尋根插江底土色黃赤無寸草腰亘兩帶深黑火光出帶間四時騰熾不絶大雨則烟煤入雨氣中延罩波上巡邊者舟過其下續長竿取火為戲兩帶相去數丈許竿止及下帶也山背萬木蔥鬱藍翠異狀雖窮冬不凋經制卜魁將軍副都統各一員統八旗旗各協領一佐領五防禦一驍騎校五火器營參領一員值訓練八旗量撥官佐之無定制先鋒營佐領二選於八旗非特設也默爾根副都統一員八旗共協領四防禦二旗各佐領二驍騎校二惟鑲藍旗佐領驍騎校各一無火器營而先鋒營如卜魁制艾渾副都統一員協領與默爾根同旗各防禦一佐領三驍騎校三火器營統於卜魁參領訓練如卜魁制先鋒亦然卜魁兵二千有四十滿洲漢軍暨索倫達呼哩巴爾虎充之艾渾兵一千二百無巴爾虎餘同默爾根兵九百皆索倫達呼哩人三城佐領滿洲二十有九又費雅喀别部籍入滿洲者佐領三索倫十有一達呼哩二十有八巴爾虎四漢軍六計八十一員分轄其衆嵗於九月大閲卜魁戶口二萬有二十七默爾根五千七百三十八艾渾一萬三千有二十四漢軍達呼哩巴爾虎兵役以及站丁黥𨽻皆與焉商賈往來無定亦立册以稽三鎮二十驛各千總一筆帖式一丁三十名馬三十匹牛二十頭管驛官二各司十驛一駐卜魁一駐默爾根土人稱為站官卜魁水師營總管一四品官二五品官一六品官二四品五品六品者猶之佐領防禦驍騎校也皆漢軍為之艾渾官制同而統於卜魁總管水手皆流人充役卜魁三百一十九艾渾四百二十七流人漸多或老懦者則輸費正役曰幫丁水手食兵餉之半故一正豫一幫戰艦百𨽻黑龍江者六𨽻諾尼江者四篷槳貯水師營庫八月將軍副都統率水師揚旗鳴鉦鼓使風於中流凡三日戰艦五年大修十年拆造就材吉林故吉林又名船厰凡几案瓿罌之屬皆附船致之卜魁艾渾諸城卜魁艾渾官莊各二十默爾根官莊十一莊二十夫夫輸穀十石凖制斛二十石草五百束嵗歉則計分以減今貯倉者卜魁積十二萬石默爾根艾渾各三萬石卜魁初立城值嵗饑將軍沙納海盡發倉穀以賑并撥附采珠船以濟布塔哈烏喇引罪入奏議於來嵗屯種還倉請敕䝉古助牛力上允其請溫語褒之邊人至今感述其事索倫本名索莪羅地産貂以捕貂為役居地詳方隅分八圍共四千九十餘人就用其人為佐領六十九員轄之更設烏和里達依里奇達統焉烏和里達猶總尉也依里奇達為副皆八旗人其在城之索倫兵七十餘人則初設鎮時收入八旗者不在八圍之內亦不應捕貂役達呼哩索倫屬俗誤打狐狸語音與䝉古稍異間雜漢語當是元代軍民府之遺索倫達呼哩諸部涵沐聖化貢身朝廊近頗以材武自表見有為近侍者邊人榮之三城兵籍達呼哩居數之半卜魁滿洲兵五百八十一漢軍二百二十索倫七十四巴爾虎二百四十達呼哩九百二十五艾渾滿洲兵五百八十漢軍一百二十索倫與達呼哩共五百墨爾根索倫與達呼哩共九百巴爾虎者喀爾喀中之一部也居地詳方隅其戍此者闌入俄羅斯境大軍征俄羅斯來歸遂編入旗今充兵者二百四十人即以其人為佐領三城軍器之散在兵者以時修補新舊相授受火器貯官庫操練時出之卜魁官馬千牛千羊萬嵗計其孳息均賞三城軍卒默爾根艾渾各遣人來應打草役皆腰長鐮著樺皮冠五月三城各遣大辨率百人巡邊至鄂爾固納河河以西俄羅斯地察視東岸沙草有無牧痕防侵界也往返各五六十日卜魁往者渡諾尼江指西北過特爾庫爾峰興安嶺涉希尼喀河開拉里依木等河草路瀰漫無轍跡辨方而行刳大樹皮以識歸路默爾根往者亦渡諾尼江西北過興安嶺盤旋層嶂中其路徑為易識艾渾往者從黑龍江溯舟北上折而西過雅克薩城故墟至界碑路多蜢如蜂其長徑寸天無風或雨後更熾行人嘗虛廬帳以納蜢而宿于外帚十數齊下人始得餐螫馬牛流血身股盡赤馬軼覔深草間見蜢髙如邱知其必斃棄不顧矣囊餱糧於樹歸時取食之近頗為捕生者所竊乃埋而識之渡河伐樹為筏馬馮水以過俄羅斯居有城屋以板為瓦廊廡隆起層叠望之如西洋圖畫耕以馬不以牛牛千百為羣放於野欲食牛則射而仆之曵以歸邊卒擕一縑值三四金者易二馬烟草三四斤易一牛秋盡俄羅斯來互市或百人或六七十人一官統之宿江之西官居氊幕植二旗於門衣冠皆織罽為之秃袖方領冠髙尺許頂方而約其下行坐有兵卒監之所擕馬牛皮毛玻璃佩刀之類易縑布烟草薑椒糖餳諸物以去俄羅斯來文二函一彼國字一䝉古字貴官與商賈名悉載康熙丙申嵗來文稱察罕汗一千七百一十六年蓋遡自有城郭人民始也署銜具先代官職於前重世祿也將軍以其文達兵部理藩院楚爾罕者兵車之㑹也地在卜魁城北十餘里定制於草青時各䝉古部落及虞人胥來通市商賈移肆以往艾渾默爾根屠沽亦皆載道輪蹄絡繹皮幣山積牛馬蔽野集初立劃沙為界各部落人駐其北商賈官卒遊人駐其南中設兵禁將軍選貢貂後始聽交通凡二十餘日貂産索倫之東北捕貂以犬非犬則不得貂虞者往還嘗自減其食以飼犬犬前驅停嗅深草間即貂穴也伏伺噙之或驚竄樹末則人犬皆息以待其下犬惜其毛不傷以齒貂亦不復戕動納于囊徐俟其死人嵗輸一於官各私識毛色彚佐領處五月將軍至墟場選以貢凡三等官給價有差不入等者聽鬻紅呼里索倫屬俗誤紅狐狸應捕貂役𨽻八圍之內鄂倫春與俄羅斯接壤𨽻籍者五百六十五人十佐領轄之輸貂如索倫制混同諾尼諸江汊産珠布塔哈烏喇嵗有打珠船來采以貢有珠之河水冷而急以大船夾威弧植篙透底數人持之泅者負袋緣篙而下得蚌滿袋貯威弧中官督剖之未成珠者仍棄於水私采之禁等於劚參威弧獨木舟名打鷹流人役也人嵗輸二鷹以海青秋黃為最貢無定數多不踰二十常倍備之以防道斃艾渾默爾根各三十架送卜魁將軍彚選之江冰始獵參領以下獵雉將軍獵野彘於通鏗河備貢數通鏗䝉古地先期移文告之正月雪後黃羊乃大集水師營率水手步獵之梃擊輒中築城不以土視隰地草土糾結者掘之尺度如墼曰垡塊厚數垡髙不盈丈圯則按地分旗飭兵修之時令四時皆寒五月始脫裘六月晝熱十數日與京師略同夜仍不能卻重衾七月則衣棉矣立冬後朔氣砭肌骨立戶外呼吸頃鬚眉俱冰出必勤以掌溫耳鼻少懈則鼻凖死耳輪作裂竹聲痛如割土人曰近頗稱暖十年前七月江即冰不復知有暑也默爾根山城寒益烈卧炕必為通夜之火更設大爐然薪于側熖甫盡則寒氣入室卧者驚而起矣數益薪始及旦春月多風四月下旬草始芽間亦早茁而漠風乍寒輒復槁牧馬届五月乃能飽齧也雪有遲早卜魁常在八九月艾渾八月默爾根七月雪不必雲也晴日亦飛霰或皎月無翳晨起而籬徑巳封旭光杲杲雪未巳也雪化簷無垂澌偶懸三五寸羣以兹卜豐嵗積雪在地氣暖則潛消而無流溢視所積日益耗而其墳然向日者仍堅凝如故也冬月窗壁挂冰皆滿踈櫺間如飾晶玉午後窗暝不能作字火炙之與紙俱落春暖乃自消蓋鐺竈噓氣所積也空室則否秋分之後微霜以降著花減色名為甜霜更十餘日一霜而百卉皆盡如出湯釡是名苦霜九月地皮裂望後月上時與中土異日落月隨上也草二三如中土十八九時南風則雨不雨亦隂晦北風晴風俗族類不一客民尤夥兼以黥徒嵗增桀驁未化頗稱難治幸法嚴無所逃畏讋不敢肆耳官廨文案防檢甚踈而無敢為奸弊者又其風之近朴也一夫力作數口仰食而有餘而炊飪浣汲舂磑之事婦女並習勤苦故居人置奴婢價嘗十倍於中土奴婢多者為富以其能致富也鄂倫春婦女皆勇决善射客至腰數矢上馬獲雉作炙以餉載兒於筐裂布縣項上射則轉筐於背旋廽便捷兒亦不驚索倫人以射獵為生挽弓皆踰十石嘗自縛於樹射熊虎洞身曵之而歸尤善躡蹤人馬有亡失者蹤之即得越數百里而知蹤之離合且能辨其日次亦異能也上元賽神比戶懸燈嵗前立燈官䦰屠儈名於神前拈之鎖印後一方之事皆所主文書可達將軍揭示有官假法真之語細事朴罰惟意出必鳴金市聲肅然官亦避道開印之前夕乃自匿去臘月八日達呼哩紅呼哩男婦並出獵取腦為速産之藥除夕懸弓矢門杙間相傳我太祖皇帝曽於除夕克强敵帝業由此以成諸屬國艷頌之遂沿為俗降神之巫曰薩滿帽如兜鍪緣檐垂五色繒條長蔽面繒外懸二小鏡如兩目狀著絳布裙鼓聲闐然應節而舞其法之最異者能舞馬於室飛鏡驅祟又能以鏡治疾遍體摩之遇病則陷肉不可拔一振蕩之骨節皆鳴而病去矣多魅為嬰孩祟者形如小犬而黑潛入土惟巫能見之巫伏草間伺其入以氊䝉突執刃以待紙封門然燈於外魅知有備輒衝氊而出巫急斬之嬰頓蘇婦著魅者面如死色喃喃如魅語晝行有小犬前導巫亦能為除之病家束草象人或如禽鳥狀擊鼓作厲詞以祭喧而送之梟其首于道曰逐鬼失馬則亟注毛齒聞於官得馬者不敢匿當官歸之酬以匹布馬病然草於路牽馬側立口呭呭作呪詞飲食三城之地艾渾為腴産粟黍大小麥默爾根産􅓱穬麥卜魁土最瘠惟産􅓱􅓱似小米而黃即稷也關西謂之穄夏秋間以未脫者入釡淺湯熟穫禾火暴以烈日焙以炕火礲而炊之香軟可食冬則生礲香稍減穬麥麩厚而粗即燕麥也其實下垂如鈴又名鈴鐺麥卜魁人曰移鎮之初此為常飱購􅓱不能盈石價倍今之稻米十年內始種􅓱而鈴鐺麥從默爾根來僅以飼牛馬間取作粥斗得粒三升頗香滑多食作氣達呼哩貴之以其易飽也稻米甚貴販自瀋陽用以待賔客食病者三城並産蕎麥甘香如雪宜糕餅中土所未得有卜魁四面數十里皆寒沙少耕作城中數萬人咸資食於䝉古􅓱田䝉古耕種嵗易其地待雨乃播不雨則終不破土故饑嵗恆多雨後相水坎處擕婦子牛羊以往氊廬孤立布種輒去不復顧逮秋復來草莠雜穫計一畝所得不及民田之半竊見國家立官莊給牛種一兵卒之力嵗納糧十石則地固非瘠而力亦可用今流人之賞旗者且倍於兵依而行之則嵗徵糧不啻萬計而桀驁之輩使皆斂手歸農又䇿之至善者守土者宜亦計及此也茶自江蘇之洞庭山來枝葉粗雜函重兩許值錢七八文八百函為一箱䝉古專用和乳交易與布並行掃土為鹽味稍苦色黑去卜魁東西各百餘里地名喇嘛寺産此三城皆食之白鹽則來自奉天黃米釀米兒酒閲日而成􅓱亦堪釀味甘而薄祀神用之取其速成而潔有醴酒之遺意焉艾渾産蘇子榨油南人食之輒嘔久乃可嘗也東北諸部落未𨽻版圖以前無釡甑罌瓿之屬熟物刳木貯水灼小石焠水中數十次瀹而食之商賈初通時以貂易釡實釡令滿一釡常數十貂後漸以貂䝉釡口易之三十年前猶以貂圍釡三匝一釡輒七八貂也今則一貂值數釡矣卜魁西北二百里山崖松柞蓊鬱江冰後作炭者乃往故直賤於冬貢賦貢莫貴於貂與珠巳載之經制其黃羊野彘雉鹿之獲於野者作邊土之物貢宜矣至於盡其土實厥篚惟錯納於王家雖蔗節桴苡之微並宜志懷方之盛焉海青即海東青出遼東鷹鶻之最俊者明一統志云小而健能擒天鵝今出黑龍江左右鶡雞雉屬出艾渾深山中及札賴特地雌者毛色若灰雄若濃靛訛呼黑雞嵗捕生者入貢遮鱸魚類白魚而首鋭無骨味若鱸一名赭鱸一名細鱗嵗貢百尾九月棲江濵捕而畜之歐李子柔條叢生髙二尺許花碎白實如小李味酸澀寧古塔艾渾皆有之花水出艾渾色赤望之如豆入口成液離枝十餘日輒化為水以蜜收為膏充貢老鎗菜即俄羅斯菘也抽薹如萵苣髙二尺餘葉出層層刪之其末層葉葉相抱如毬取次而舒已舒之葉老不堪食割毬烹之略似安肅冬菘郊圃種不滿二百本八月移盆官辨分畜之冬月苞紙以貢菱六稜而小産諾尼江去皮乾之蕎麥麵更三四磨者白如雪艾渾麥麵甘香勝中土所産作餅鬆美白堊如粉入水十餘日制其燥塗壁不裂物産杜實産艾渾小而赤似桑椹味酸夸闌蘑菰生卜魁城東草地內七月入市夸闌者氊廬椸木所立之周遭也木氣入土生蘑故名今因其白色黑闌名為花闌乃强解耳老鎗穀莖葉如雞冠髙丈許實如栟櫚子深赤色取粒作粥香美花有蜀葵葵萱蓼鳳仙長春刺梅金錢土人呼葵為鬼臉葵雀兒花色翡翠似鴛鴦菊而單蒂跗橫枝上如鳥之翔閃緞花以色名似龍爪而小山丹而曲草芙蓉不知何以名葉細如皂莢花黃同菊瓣規髙者亭亭二尺許萬年菊花葉類草芙蓉色黃枝柔䝉密延蔓一本可百餘花或曰即層瓣髙麗菊也髙麗菊産朝鮮枝葉類萬年菊單瓣色黃赤相間如虎皮日奇花類蝴蝶花而小一莖十數花辰收申放數必奇故名葉如萱萵苣蓮即嬰粟六月始花髙尺許葉如萵苣單瓣微紅中土人擕千層五色種布之輒變菊亦畏霜五月茁枝瘦弱八月移盆入室臨南窗下十月花大如錢棠梨郊圃間有之土人繫繒條於上曰神所憑伏臘祀之有戕其枝者則怒不知何所取義城南三十里有栁叢生細不及指髙不及肩杏亦然無成樹者花小不實土人老死不知鮮果為何物也藥味有益母草赤白芍藥防風黃芩百合木賊蒺藜甘草車前子麥虋冬五味子薄荷黃精艾渾産黃連然皆雜烟莽中萎於霜雪無採劚者羊草西北邊謂之羊鬍草長尺許莖末圓徑如松針黝色油潤飼馬肥澤勝豆粟逺甚居人於七八月間刈積之經冬不變大宛苜蓿疑即此中土以苜蓿為菜蓋名同也索倫産馬身長足健毛短而澤鄂倫春無馬多鹿乘載與馬無異廬帳所在皆有之用罷任去招之即來有殺食之斯不復至鄂倫春地宜樺冠履器具廬帳舟渡皆以樺皮為之黑龍江産魚惟鯽一種諾尼江無蝦蟹而魚屬皆備五月魚車塞路長二尺許者值十餘錢六七月水漲則大魚不入網江凍鑿冰取之價十倍夏多鯉冬多鯾鱖味淡而腥勾星魚鱗斑然如列星長喙漁者間以箸探其口齧之至死不釋段刃之釡中猶躍躍也腥穢不可食堪達含駝鹿也項多肉陸佃埤雅云北方有鹿形如駝即此色蒼黃無斑角堅瑩如玉中有黑理橫截之鏤為决使理周於外一線勻圓選一决於數十角直數萬錢弟世莊有詩曰臃腫額端欺鹿角郎當項下鬬狼胡可憐骨碎三軍指曾助天山一箭無沙雞鳩形鶉毛足髙二寸許味勝家雞老鎗雀一名千里紅與雀無異惟顛有紅毛産俄羅斯地至以十一月囮而取之炙食甚美籠畜之輒死無蟻蚊不入室五色石産黑龍諾尼兩江岸通明如瑪瑙紅圓者象含桃或取以飾念珠空青漁人間得之不敢私匿將軍酬以值遣官奏進或辨卒自得之即遣送京師奏其名例得賜紵帛龍骨艾渾江岸數尺下恆有之或曰龍蛻或曰孽龍謫而死者屋宇屋皆南向迎暄也日斜猶照故西必設窗間有北牖八月墐之夏始啓屋無堂室厰三楹西南北土牀相連曰卍字炕虛東為然薪地西為尊南次之皆賔位也土垣髙不踰五尺僅可闌牛馬門亦如闌穿橫木以為啓閉中土人居之始設門相傳未立城時惟溝其宅之四面為界拉核牆核猶言骨也木為骨而拉泥以成故名立木如柱五尺為間層施橫木相去尺許以鹻草絡泥挂而排之嵗加塗焉厚尺許者堅甚于甃一曰挂泥壁工匠皆流人技拙而直貴土著人架木覆茅婦子合作戚友之能匠事者助而不傭草屋茅厚尺許三嵗再葺之官署亦然暖於瓦也庵廟則瓦卜魁柵木為城將軍公署私第皆在夾植大木中實以土寬丈許木末髙低相間肖睥睨四門外環土城纍垡為之周六里西面二門近南者臨水寬廣可數百畝江漲則通流墨爾根艾渾重城皆植木為之龍沙紀略
